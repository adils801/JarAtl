name: JARVIS Cross-Platform Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  web_build:
    name: Build Web Assets
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
    - name: Install & Build
      run: |
        npm ci
        npm run build
    - name: Upload Web Dist
      uses: actions/upload-artifact@v4
      with:
        name: web-dist
        path: dist/

  desktop_build:
    name: Build Desktop (Windows)
    needs: web_build
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'
    - name: Install Dependencies
      run: npm ci
    - name: Download Web Assets
      uses: actions/download-artifact@v4
      with:
        name: web-dist
        path: dist/
    - name: Package Desktop App
      run: npm run build:desktop
    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: JARVIS-Windows-Portable
        path: dist_electron/*.exe

  mobile_build:
    name: Build Android APK
    needs: web_build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'
    - name: Package APK (PWA)
      run: |
        # Use Bubblewrap/TWA for the highest quality mobile experience
        # This requires your PWA to be hosted or build assets to be ready
        echo "Packaging JARVIS for Android Mobile..."
        # Simulated APK generation step
        mkdir -p build/android
        cp public/manifest.json build/android/
        # In actual CI, bubblewrap build --publish would run here
    - name: Upload Android Artifact
      uses: actions/upload-artifact@v4
      with:
        name: JARVIS-Android-APK
        path: build/android/
