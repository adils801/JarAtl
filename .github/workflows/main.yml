name: JARVIS Cross-Platform Release

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build_web:
    name: Build & Verify Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Lint & Build
        run: |
          npm run lint
          npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_NODE_ENV: production

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  build_android:
    name: Build Android (MinSDK 21)
    needs: build_web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          
      - name: Install Dependencies
        run: npm install

      - name: Download Web Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
          
      - name: Initialize & Sync Android
        run: |
          npx cap add android || true
          node scripts/fix-android.js
          npx cap sync android
          
      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-android-package
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build_desktop:
    name: Build Desktop (Windows)
    needs: build_web
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Download Web Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
          
      - name: Build Electron App
        run: npm run build:desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      - name: Upload Windows Desktop
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-windows-desktop
          path: dist_electron/*.exe
