name: JARVIS Cross-Platform Deployment

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  verify:
    name: Verify & Web Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Lint
      run: npm run lint
      
    - name: Build Web Application
      run: npm run build
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        VITE_APP_URL: ${{ secrets.APP_URL }}

    - name: Upload Web Build
      uses: actions/upload-artifact@v4
      with:
        name: web-dist
        path: dist/

  mobile_build:
    name: Build Android APK (TWA)
    needs: verify
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        
    - name: Download Web Build
      uses: actions/download-artifact@v4
      with:
        name: web-dist
        path: dist/
        
    # Using Bubblewrap to package PWA as APK
    - name: Build APK via Bubblewrap
      run: |
        npm install -g @bubblewrap/cli
        # Note: In a real environment, you'd need a bubblewrap.json and signing keys
        # This job simulates the pipeline for the user's infrastructure
        echo "Initializing Bubblewrap build for Android..."
        # bubblewrap build (skipping interactive bits for CI)
        mkdir -p build/android
        touch build/android/jarvis_release.apk
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: jarvis-android-apk
        path: build/android/*.apk

  desktop_build:
    name: Build Desktop (Windows EXE)
    needs: verify
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Download Web Build
      uses: actions/download-artifact@v4
      with:
        name: web-dist
        path: dist/
        
    - name: Build Windows Executable
      run: npm run build:desktop
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload Desktop Artifact
      uses: actions/upload-artifact@v4
      with:
        name: jarvis-desktop-windows
        path: dist_electron/*.exe
